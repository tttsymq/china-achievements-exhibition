<h2>「中国发展全景沙盘」整体呈现方式</h2>
<p class="subtitle">三种不同的体验方向，你觉得哪一种最符合教学场景的需求？</p>

<div class="options">
  <div class="option" data-choice="3d" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>3D 交互式沙盘</h3>
      <p>3D 地球/地图，可旋转缩放，点击城市/区域弹出对比面板（发达 vs 欠发达场景）。适合大屏展示，视觉冲击力强。</p>
    </div>
  </div>
  <div class="option" data-choice="split" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>双面对比仪表盘</h3>
      <p>左右分屏，左侧展示发达地区数据与3D场景，右侧同步展示偏远地区。通过滑块/时间轴控制对比维度（教育、医疗、基建等）。</p>
    </div>
  </div>
  <div class="option" data-choice="story" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>故事化叙事滚动页</h3>
      <p>向下滚动逐步展开叙事，每个章节聚焦一个主题（基建、教育、医疗、科技），用数据可视化+图片+动画讲述两面性故事。</p>
    </div>
  </div>
</div>
